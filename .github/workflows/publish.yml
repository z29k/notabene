name: Publish

# Publishes @z29k/notabene to npm and cuts a GitHub Release when a version tag (vX.Y.Z)
# is pushed. Auth is npm **trusted publishing** (OIDC) — no long-lived token. The tag must
# match packages/renderer/package.json's version. `workflow_dispatch` publishes the current
# committed version by hand from the Actions tab (e.g. the first run).
#
# One-time setup (owner), on npmjs.com → the @z29k/notabene package → Settings → Trusted
# Publisher: add a GitHub Actions publisher with repository `z29k/notabene` and workflow
# `publish.yml`. That authorizes this workflow to publish without a token.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Use latest npm (trusted publishing needs npm >= 11.5)
        run: npm install -g npm@latest
      - run: npm ci

      # Same gates as CI — never publish something that doesn't pass.
      - name: Lint
        run: npm run lint
        working-directory: packages/renderer
      - name: Test
        run: npm test
        working-directory: packages/renderer
      - name: Prepare a scratch consumer
        run: |
          set -e
          mkdir -p /tmp/consumer/docs
          printf '# Hello\n\nGFM hostile to MDX: Promise<T>, <a@b.com>, {x}, | a | b |\n' > /tmp/consumer/docs/index.md
          node packages/renderer/bin/notabene.mjs init --root /tmp/consumer
      - name: Type-check
        run: npm run check
        working-directory: packages/renderer
        env:
          NOTABENE_ROOT: /tmp/consumer
          NOTABENE_CONFIG: /tmp/consumer/notabene.config.mjs
      - name: Smoke build
        run: node packages/renderer/bin/notabene.mjs build --root /tmp/consumer

      - name: Verify the tag matches the package version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./packages/renderer/package.json').version")
          echo "tag=$TAG package=$PKG"
          [ "$TAG" = "$PKG" ] || { echo "::error::tag v$TAG != package.json $PKG"; exit 1; }

      - name: Skip if this version is already on npm
        id: pub
        run: |
          PKG=$(node -p "require('./packages/renderer/package.json').version")
          if npm view "@z29k/notabene@$PKG" version >/dev/null 2>&1; then
            echo "@z29k/notabene@$PKG is already published — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Trusted publishing: OIDC auth (id-token) + automatic provenance. No NODE_AUTH_TOKEN.
      - name: Publish to npm
        if: steps.pub.outputs.skip != 'true'
        run: npm publish --access public
        working-directory: packages/renderer

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists — leaving it."
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi
