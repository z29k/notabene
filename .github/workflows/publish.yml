name: Publish

# Publishes @z29k/notabene to npm when a version tag (vX.Y.Z) is pushed. The tag must
# match packages/renderer/package.json's version. `workflow_dispatch` lets you publish the
# current committed version by hand from the Actions tab (e.g. the very first run).
#
# One-time setup (repo owner): create an npm **automation** token
# (npmjs.com → Access Tokens → Generate → Automation) and add it as a repository secret
# named `NPM_TOKEN` (Settings → Secrets and variables → Actions).
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance (public repo → signed build attestation)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci

      # Same gates as CI — never publish something that doesn't pass.
      - name: Lint
        run: npm run lint
        working-directory: packages/renderer
      - name: Test
        run: npm test
        working-directory: packages/renderer
      - name: Prepare a scratch consumer
        run: |
          set -e
          mkdir -p /tmp/consumer/docs
          printf '# Hello\n\nGFM hostile to MDX: Promise<T>, <a@b.com>, {x}, | a | b |\n' > /tmp/consumer/docs/index.md
          node packages/renderer/bin/notabene.mjs init --root /tmp/consumer
      - name: Type-check
        run: npm run check
        working-directory: packages/renderer
        env:
          NOTABENE_ROOT: /tmp/consumer
          NOTABENE_CONFIG: /tmp/consumer/notabene.config.mjs
      - name: Smoke build
        run: node packages/renderer/bin/notabene.mjs build --root /tmp/consumer

      - name: Verify the tag matches the package version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./packages/renderer/package.json').version")
          echo "tag=$TAG package=$PKG"
          [ "$TAG" = "$PKG" ] || { echo "::error::tag v$TAG != package.json $PKG"; exit 1; }

      - name: Skip if this version is already on npm
        id: pub
        run: |
          PKG=$(node -p "require('./packages/renderer/package.json').version")
          if npm view "@z29k/notabene@$PKG" version >/dev/null 2>&1; then
            echo "@z29k/notabene@$PKG is already published — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.pub.outputs.skip != 'true'
        run: npm publish --provenance --access public
        working-directory: packages/renderer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
