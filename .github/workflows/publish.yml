name: Publish

# One workflow, two channels × two registries (npm allows a single Trusted Publisher per
# package, so both channels must run from this file — the one registered on npmjs.com):
#   • push to `develop`      → prerelease `X.Y.Z-dev.N` on the `dev` dist-tag   (staging)
#   • push a `vX.Y.Z` tag    → stable `X.Y.Z` on `latest` + a GitHub Release    (production)
#
# Each publish runs twice, once per registry:
#   • npmjs.org           → canonical, anonymously installable. Auth = trusted publishing
#                           (OIDC) — no stored token, provenance automatic.
#   • npm.pkg.github.com  → mirror that fills the repo's Packages section. Auth = the built-in
#                           GITHUB_TOKEN (`packages: write`). No provenance, and installing from
#                           it needs a GitHub PAT (`read:packages`) even though it's public — so
#                           npmjs stays the real distribution channel; this one is a vitrine.
# The job runs in the `production` GitHub Environment to match the Trusted Publisher config.
#
# One-time setup (owner): npmjs.com → @z29k/notabene → Settings → Trusted Publisher →
# repo `z29k/notabene`, workflow `publish.yml`, environment `production`.
on:
  push:
    branches: [develop]
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write # create the GitHub Release
      id-token: write # OIDC for npm trusted publishing + provenance
      packages: write # publish the mirror to GitHub Packages (npm.pkg.github.com)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted publishing needs npm >= 11.5. Pin the 11.x line: npm 12.0.x drops the bundled
      # `sigstore` module on global install, which breaks provenance signing at publish time
      # (npm error "Cannot find module 'sigstore'"). Revisit once 12.x is fixed.
      - name: Pin npm 11.x (>= 11.5, avoids the 12.0.x provenance/sigstore break)
        run: npm install -g 'npm@^11.5'
      - run: npm ci

      # Same gates as CI — never publish something that doesn't pass.
      - name: Lint
        run: npm run lint
        working-directory: packages/renderer
      - name: Test
        run: npm test
        working-directory: packages/renderer
      - name: Prepare a scratch consumer
        run: |
          set -e
          mkdir -p /tmp/consumer/docs
          printf '# Hello\n\nGFM hostile to MDX: Promise<T>, <a@b.com>, {x}, | a | b |\n' > /tmp/consumer/docs/index.md
          node packages/renderer/bin/notabene.mjs init --root /tmp/consumer
      - name: Type-check
        run: npm run check
        working-directory: packages/renderer
        env:
          NOTABENE_ROOT: /tmp/consumer
          NOTABENE_CONFIG: /tmp/consumer/notabene.config.mjs
      - name: Smoke build
        run: node packages/renderer/bin/notabene.mjs build --root /tmp/consumer

      # ── production: vX.Y.Z tag → stable @latest + GitHub Release ──────────────
      - name: Verify the tag matches the package version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./packages/renderer/package.json').version")
          echo "tag=$TAG package=$PKG"
          [ "$TAG" = "$PKG" ] || { echo "::error::tag v$TAG != package.json $PKG"; exit 1; }
      - name: Publish stable to npm (@latest)
        if: github.ref_type == 'tag'
        working-directory: packages/renderer
        run: |
          PKG=$(node -p "require('./package.json').version")
          if npm view "@z29k/notabene@$PKG" version >/dev/null 2>&1; then
            echo "@z29k/notabene@$PKG is already published — skipping."
          else
            npm publish --access public
          fi
      # Mirror the same stable tarball to GitHub Packages so the repo's Packages section
      # tracks releases. Registry + auth go via CLI flags (highest precedence) rather than
      # `npm config set`, which errors ENOWORKSPACES from inside a workspace member. No
      # provenance on this registry.
      - name: Mirror stable to GitHub Packages
        if: github.ref_type == 'tag'
        working-directory: packages/renderer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG=$(node -p "require('./package.json').version")
          AUTH="--//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          if npm view "@z29k/notabene@$PKG" --registry https://npm.pkg.github.com "$AUTH" version >/dev/null 2>&1; then
            echo "@z29k/notabene@$PKG already on GitHub Packages — skipping."
          else
            npm publish --registry https://npm.pkg.github.com "$AUTH" --no-provenance
          fi
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists — leaving it."
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi

      # ── staging: push to develop → prerelease @dev ───────────────────────────
      - name: Publish prerelease to npm (@dev)
        if: github.ref_type == 'branch' && github.ref_name == 'develop'
        working-directory: packages/renderer
        run: |
          BASE=$(node -p "require('./package.json').version")
          BASE="${BASE%%-*}"
          VER="${BASE}-dev.${GITHUB_RUN_NUMBER}"
          echo "publishing $VER to @dev"
          npm version "$VER" --no-git-tag-version
          npm publish --tag dev --access public
      # Mirror the just-bumped prerelease (package.json now holds X.Y.Z-dev.N) to GitHub Packages.
      - name: Mirror prerelease to GitHub Packages (@dev)
        if: github.ref_type == 'branch' && github.ref_name == 'develop'
        working-directory: packages/renderer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTH="--//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          npm publish --tag dev --registry https://npm.pkg.github.com "$AUTH" --no-provenance
