name: Publish

# One workflow, two channels (npm allows a single Trusted Publisher per package, so both
# must run from this file — the one registered on npmjs.com):
#   • push to `develop`      → prerelease `X.Y.Z-dev.N` on the `next` dist-tag  (staging)
#   • push a `vX.Y.Z` tag    → stable `X.Y.Z` on `latest` + a GitHub Release    (production)
# Auth is npm trusted publishing (OIDC) — no stored token, provenance automatic. The job
# runs in the `production` GitHub Environment to match the Trusted Publisher config.
#
# One-time setup (owner): npmjs.com → @z29k/notabene → Settings → Trusted Publisher →
# repo `z29k/notabene`, workflow `publish.yml`, environment `production`.
on:
  push:
    branches: [develop]
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write # create the GitHub Release
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Use latest npm (trusted publishing needs npm >= 11.5)
        run: npm install -g npm@latest
      - run: npm ci

      # Same gates as CI — never publish something that doesn't pass.
      - name: Lint
        run: npm run lint
        working-directory: packages/renderer
      - name: Test
        run: npm test
        working-directory: packages/renderer
      - name: Prepare a scratch consumer
        run: |
          set -e
          mkdir -p /tmp/consumer/docs
          printf '# Hello\n\nGFM hostile to MDX: Promise<T>, <a@b.com>, {x}, | a | b |\n' > /tmp/consumer/docs/index.md
          node packages/renderer/bin/notabene.mjs init --root /tmp/consumer
      - name: Type-check
        run: npm run check
        working-directory: packages/renderer
        env:
          NOTABENE_ROOT: /tmp/consumer
          NOTABENE_CONFIG: /tmp/consumer/notabene.config.mjs
      - name: Smoke build
        run: node packages/renderer/bin/notabene.mjs build --root /tmp/consumer

      # ── production: vX.Y.Z tag → stable @latest + GitHub Release ──────────────
      - name: Verify the tag matches the package version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./packages/renderer/package.json').version")
          echo "tag=$TAG package=$PKG"
          [ "$TAG" = "$PKG" ] || { echo "::error::tag v$TAG != package.json $PKG"; exit 1; }
      - name: Publish stable to npm (@latest)
        if: github.ref_type == 'tag'
        working-directory: packages/renderer
        run: |
          PKG=$(node -p "require('./package.json').version")
          if npm view "@z29k/notabene@$PKG" version >/dev/null 2>&1; then
            echo "@z29k/notabene@$PKG is already published — skipping."
          else
            npm publish --access public
          fi
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists — leaving it."
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi

      # ── staging: push to develop → prerelease @next ──────────────────────────
      - name: Publish prerelease to npm (@next)
        if: github.ref_type == 'branch' && github.ref_name == 'develop'
        working-directory: packages/renderer
        run: |
          BASE=$(node -p "require('./package.json').version")
          BASE="${BASE%%-*}"
          VER="${BASE}-dev.${GITHUB_RUN_NUMBER}"
          echo "publishing $VER to @next"
          npm version "$VER" --no-git-tag-version
          npm publish --tag next --access public
